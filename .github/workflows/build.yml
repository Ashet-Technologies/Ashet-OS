name: Build

env:
  ZIG_VERSION: "0.15.2"
  ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}/.zig-global-cache

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        platform:
          - arm-ashet-vhc
          - arm-ashet-hc
          - arm-qemu-virt
          - rv32-qemu-virt
          - x86-hosted-linux
          - x86-pc-generic

    runs-on: ${{matrix.os}}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Cache Zig package cache
        uses: actions/cache@v4
        with:
          path: ${{ env.ZIG_GLOBAL_CACHE_DIR }}/p
          key: zig-pkg-cache-${{ env.ZIG_VERSION }}-${{ hashFiles('**/build.zig.zon') }}
          restore-keys: |
            zig-pkg-cache-${{ env.ZIG_VERSION }}-
          enableCrossOsArchive: true

      - name: Build ${{ matrix.platform }}
        run: |
          zig build ${{ matrix.platform }}

      - name: Upload disk image
        uses: actions/upload-artifact@v4
        if: ${{ matrix.os == 'ubuntu-latest' }}
        with:
          name: ${{ matrix.platform }}
          path: zig-out/${{ matrix.platform }}
          if-no-files-found: warn
          retention-days: 7

  tools:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{matrix.os}}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Cache Zig package cache
        uses: actions/cache@v4
        with:
          path: ${{ env.ZIG_GLOBAL_CACHE_DIR }}/p
          key: zig-pkg-cache-${{ env.ZIG_VERSION }}-${{ hashFiles('**/build.zig.zon') }}
          restore-keys: |
            zig-pkg-cache-${{ env.ZIG_VERSION }}-
          enableCrossOsArchive: true

      - name: Build Tools
        run: |
          zig build tools

      - name: Upload tools
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}
          path: zig-out
          if-no-files-found: warn
          retention-days: 7
