<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Ashet OS</title><!-- not BASIC! -->
    <script src="v86/libv86.js"></script>
    <style>
      * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }

    body {
      display: grid;
      grid-template-rows: min-content auto min-content;
      grid-template-columns: 100%;

      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      flex-direction: row;
      padding: 4pt;
      gap: 4pt;
    }

    .toolbar button {
      width: 3em;
      height: 3em;
    }

    .toolbar button svg {
        width: 100%;
        height: 100%;
    }

    .monitor {
      display: grid;
      justify-self: stretch;
      align-self: stretch;
      justify-content: center;
      align-content: center;
/* 
      background: url(img/crt.png);
      background-size: contain;
      background-color: #d2ccba;
      background-position: center;
      background-repeat: no-repeat; */
    }

    .monitor canvas {

      /* margin-left: 69px;
      margin-top: 72px;

      margin-right: 69px;
      margin-bottom: 76px; */
    }

    .console {
      font-family: 'Berkeley Mono', 'Source Code Pro', 'Terminus', 'Consolas', 'Courier New', Courier, monospace;
      overflow: scroll;
      resize: none;
      height: 20em;
    }
    </style>
    <script>
      "use strict";

    window.onload = function () {
      let serial_console = document.getElementById("serial_console");
      let screen_container = document.getElementById("screen_container");
      var emulator = window.emulator = new V86({
        wasm_path: "v86/v86.wasm",
        memory_size: 32 * 1024 * 1024,
        vga_memory_size: 2 * 1024 * 1024,
        screen_container: screen_container,
        bios: {
          url: "bios/seabios.bin",
        },
        vga_bios: {
          url: "bios/vgabios.bin",
        },
        // cdrom: {
        //     url: "images/livedemo.iso",
        // },
        hda: {
          url: "images/livedemo.img",
        },
        autostart: true,

        // A textarea that will receive and send data to the emulated serial terminal.
        // Alternatively the serial terminal can also be accessed programatically, see [serial.html](../examples/serial.html).
        // serial_container?: HTMLTextAreaElement;
        serial_container: serial_console,

        // Xtermjs serial terminal container. When set, serial_container option is ignored.
        // serial_container_xtermjs?: HTMLElement;
      });

      window.start_vm = function() {
        emulator.run();
      };

      window.stop_vm = function() {
        emulator.stop();
      };

      window.restart_vm = function() {
        emulator.restart();
      };
    }
    </script>
  </head>
  <body>
    <nav class="toolbar">
      <button title="Run" onclick="start_vm()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
      </button>
      <button title="Pause" onclick="stop_vm()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M14,19H18V5H14M6,19H10V5H6V19Z"/></svg>
      </button>
      <button title="Force Reboot" onclick="restart_vm()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M10 4.03V.633L5 5.63L10 10.63V6.03C11.5 6.03 13.11 6.63 14.21 7.73C16.5 10.13 16.5 13.93 14.21 16.23C12.91 17.53 11.11 18.13 9.4 17.93L8.9 19.93C11.31 20.23 13.81 19.53 15.61 17.63C18.7 14.53 18.7 9.43 15.61 6.33C14.11 4.83 12.11 4.03 10 4.03M4.31 17.63C5.11 18.43 6 19.03 7 19.43L7.61 17.43C6.91 17.13 6.31 16.73 5.81 16.23C3.91 14.43 3.5 11.63 4.61 9.43L3.11 7.93C1.31 11.03 1.71 15.03 4.31 17.63M20 13H22V7H20V13M20 17H22V15H20V17Z"/></svg>
      </button>
    </nav>
    <div id="screen_container" class="monitor">
      <div style="white-space: pre; font: 14px monospace; line-height: 14px"></div>
      <canvas style="display: none"></canvas>
    </div>
    <textarea id="serial_console" class="console"></textarea>
  </body>
</html>
