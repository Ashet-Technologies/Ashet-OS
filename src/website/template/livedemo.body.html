<main id="livedemo">
	<nav class="panel toolbar">
		<button id="run_button" title="Run" aria-label="Run" onclick="start_vm()" disabled>
			<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
		</button>
		<button id="pause_button" title="Pause" aria-label="Pause" onclick="stop_vm()" disabled>
			<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M14,19H18V5H14M6,19H10V5H6V19Z"/></svg>
		</button>
		<button id="restart_button" title="Force Reboot" aria-label="Force Reboot" onclick="restart_vm()" disabled>
			<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M10 4.03V.633L5 5.63L10 10.63V6.03C11.5 6.03 13.11 6.63 14.21 7.73C16.5 10.13 16.5 13.93 14.21 16.23C12.91 17.53 11.11 18.13 9.4 17.93L8.9 19.93C11.31 20.23 13.81 19.53 15.61 17.63C18.7 14.53 18.7 9.43 15.61 6.33C14.11 4.83 12.11 4.03 10 4.03M4.31 17.63C5.11 18.43 6 19.03 7 19.43L7.61 17.43C6.91 17.13 6.31 16.73 5.81 16.23C3.91 14.43 3.5 11.63 4.61 9.43L3.11 7.93C1.31 11.03 1.71 15.03 4.31 17.63M20 13H22V7H20V13M20 17H22V15H20V17Z"/></svg>
		</button>
	</nav>
	<div class="panel monitor-parent">
		<div id="screen_container" class="monitor">
			<div style="white-space: pre; font: 14px monospace; line-height: 14px">Dummy</div>
			<canvas style="display: none"></canvas>
		</div>
		<ul id="emulator_status">
		</ul>
		<button id="launch_button" title="Start Emulator" aria-label="Start Emulator" onclick="launch_emulator()">
			<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
		</button>
	</div>
	<div class="panel">
		<!-- <textarea id="serial_console" class="console" readonly>Booting...
			Press [Space]!.
		</textarea> -->
		<div id="serial_console" class="console"></div>
	</div>
</main>
